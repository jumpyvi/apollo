---
name: Reusable Build and Push
on:
  workflow_call:
    inputs:
      image-name: 
        description: "The output OCI name"
        default: "${{ github.event.repository.name }}"
        type: string
      image-tag: 
        description: "The version tag to be used for this image build"
        default: "latest"
        type: string
      image-profiles:
        description: Additional profiles to use with mkosi (alongside bootc) - space seperated
        default: ""
        type: string 
      rechunk: 
        description: Whether this image should be rechunked with Chunkah
        required: false
        default: true
        type: boolean
    secrets:
      SIGNING_SECRET:
        required: false

env:
  IMAGE_DESC: "Experimental arch-bootc POC image"
  IMAGE_KEYWORDS: "bootc,archlinux,arch"
  IMAGE_LOGO_URL: "https://avatars.githubusercontent.com/u/230667510?s=400&u=cb912a5db49aee164a609a0fb4967d2d8170feb9&v=4"
  IMAGE_NAME: "${{ inputs.image-name }}"
  IMAGE_PROFILES: "${{ inputs.image-profiles }}"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  DEFAULT_TAG: "${{ inputs.image-tag }}"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}-${{ inputs.image-name }}
  cancel-in-progress: true

jobs:
  build_push:
    name: Build and push image
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Prepare environment
        run: |
          # Lowercase the image uri
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      # These stage versions are pinned by https://github.com/renovatebot/renovate
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: 'recursive'

      - name: Get current date
        id: date
        run: |
          # This generates a timestamp like what is defined on the ArtifactHub documentation
          # E.G: 2022-02-08T15:38:15Z'
          # https://artifacthub.io/docs/topics/repositories/container-images/
          # https://linux.die.net/man/1/date
          echo "date=$(date -u +%Y\-%m\-%d\T%H\:%M\:%S\Z)" >> $GITHUB_OUTPUT

      - name: Image Metadata
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        id: metadata
        with:
          tags: |
            type=raw,value=${{ env.DEFAULT_TAG }}
            type=raw,value=${{ env.DEFAULT_TAG }}.{{date 'YYYYMMDD'}}
            type=raw,value={{date 'YYYYMMDD'}}
            type=sha,enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=pr
          labels: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/README.md
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.description=${{ env.IMAGE_DESC }}
            org.opencontainers.image.documentation=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/README.md
            org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/blob/${{ github.sha }}/Containerfile
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.url=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/tree/${{ github.sha }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ env.DEFAULT_TAG }}.{{date 'YYYYMMDD'}}
            io.artifacthub.package.deprecated=false
            io.artifacthub.package.keywords=${{ env.IMAGE_KEYWORDS }}
            io.artifacthub.package.license=Apache-2.0
            io.artifacthub.package.logo-url=${{ env.IMAGE_LOGO_URL }}
            io.artifacthub.package.prerelease=false
            containers.bootc=1
          sep-tags: " "
          sep-annotations: " "

      - name: Mount BTRFS for podman storage
        id: container-storage-action
        uses: ublue-os/container-storage-action@dc1f4c8f17b672069e921f001132f7cf98a423a6
        continue-on-error: true
        with:
          target-dir: /var/lib/containers
          mount-opts: compress-force=zstd:2

      # We need newer podman due to old podman not supporting lots of flags
      - name: Update podman and install just
        shell: bash
        run: |
          set -eux
          # Require the runner is ubuntu-24.04
          IDV=$(. /usr/lib/os-release && echo ${ID}-${VERSION_ID})
          test "${IDV}" = "ubuntu-24.04"
          # resolute is the next release. The azure.archive.ubuntu.com mirror only carries amd64.
          # Other architectures like arm64 use ports.ubuntu.com/ubuntu-ports.
          if [ "$(dpkg --print-architecture)" = "amd64" ]; then
            mirror="http://azure.archive.ubuntu.com/ubuntu"
          else
            mirror="http://ports.ubuntu.com/ubuntu-ports"
          fi
          echo "deb ${mirror} resolute universe main" | sudo tee /etc/apt/sources.list.d/resolute.list
          /bin/time -f '%E %C' sudo apt update
          # skopeo is currently older in resolute for some reason hence --allow-downgrades
          /bin/time -f '%E %C' sudo apt install -y --allow-downgrades crun/resolute buildah/resolute podman/resolute skopeo/resolute just/resolute
          podman --version

      - name: Install mkosi
        uses: systemd/mkosi@c4c3d793d0f6f0a2f26895de5ed9382396f36bb5

      - name: Build image with mkosi
        id: build 
        run: |
          args="" 

          for profile in $IMAGE_PROFILES; do
            args="$args --profile $profile"
          done
          
          sudo mkosi -B --profile bootc ${args} --debug -ff --tools-tree-distribution=arch

      - name: Load the image into the local storage
        run:
          just load
        
      - name: Rechunk the final image
        if: ${{ inputs.rechunk == true }}
        run: |
          just rechunk

      - name: Tag images
        run: |
          just load
          for tag in $DOCKER_METADATA_OUTPUT_TAGS; do
              podman tag apollo:latest $IMAGE_NAME:$tag;
          done

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LOGIN_USER: ${{ github.actor }}
        run: echo "${GITHUB_TOKEN}" | sudo podman login -u "${LOGIN_USER}" --password-stdin "ghcr.io"

      - name: Push to GHCR
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        id: push
        env:
          IMAGE_DIGEST: ${{ steps.load.outputs.digest }}
          MAX_RETRIES: 3
          PLATFORM: ${{ matrix.platform }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          SIGNING_SECRET: ${{ secrets.SIGNING_SECRET }}
        run: |
          # HACK: push two times so layer annotations are present
          # TODO: remove me when https://github.com/containers/podman/issues/27796 fixed
          for tag in $DOCKER_METADATA_OUTPUT_TAGS; do
            for _ in $(seq 2); do
              sudo podman push --retry "${MAX_RETRIES}" --compression-format=zstd "localhost/${IMAGE_NAME}:${DEFAULT_TAG}" "${IMAGE_REGISTRY}/${IMAGE_NAME}:$tag"
            done
          done

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)

      - name: Sign container image
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          IMAGE_FULL="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}"
          for tag in ${{ steps.metadata.outputs.tags }}; do
            cosign sign -y --key env://COSIGN_PRIVATE_KEY $IMAGE_FULL:$tag
          done
        env:
          TAGS: ${{ steps.push.outputs.digest }}
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
